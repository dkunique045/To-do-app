<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0eb;
      --card: #ffffff;
      --border: #e8e2da;
      --text: #1a1612;
      --muted: #9a8f84;
      --accent: #d4622a;
      --accent-light: #fdf0ea;
      --done-bg: #f0f5ee;
      --done-text: #5a7a52;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 500px;
    }

    .header {
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .header h1 span { color: var(--accent); }

    .date-line {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 400;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem 1rem;
      flex: 1;
      text-align: center;
    }

    .stat-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .input-row input {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1.1rem;
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      outline: none;
      transition: border 0.2s;
    }

    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .input-row button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 1.4rem;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }

    .input-row button:hover { opacity: 0.85; }
    .input-row button:active { transform: scale(0.95); }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
    }

    .filter-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-family: 'Outfit', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.25s ease;
      transition: opacity 0.2s, border-color 0.2s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done {
      background: var(--done-bg);
      border-color: #c8dfc3;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 11px;
      color: transparent;
    }

    .todo-item.done .check-btn {
      background: var(--done-text);
      border-color: var(--done-text);
      color: white;
    }

    .todo-text {
      flex: 1;
      font-size: 0.92rem;
      color: var(--text);
      font-weight: 400;
      line-height: 1.4;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-meta {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: var(--accent);
      background: var(--accent-light);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }

    .empty-text {
      font-size: 0.88rem;
    }

    .clear-row {
      margin-top: 1.25rem;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: transparent;
      border: none;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .clear-btn:hover { color: var(--accent); }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>My <span>Tasks</span></h1>
      <div class="date-line" id="dateLabel"></div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="activeCount">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="doneCount">0</div>
        <div class="stat-label">Done</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="120"/>
      <button onclick="addTask()">+</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="todo-list" id="todoList"></div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <div class="empty-text">No tasks here. Add one above!</div>
    </div>

    <div class="clear-row">
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('mytasks')) || [];
    let currentFilter = 'all';

    // Date display
    const now = new Date();
    document.getElementById('dateLabel').textContent = now.toLocaleDateString('en-IN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    function save() {
      localStorage.setItem('mytasks', JSON.stringify(tasks));
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;

      const task = {
        id: Date.now(),
        text,
        done: false,
        time: new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
      };

      tasks.unshift(task);
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const emptyState = document.getElementById('emptyState');

      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const active = total - done;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('progressFill').style.width = total ? Math.round((done / total) * 100) + '%' : '0%';

      let filtered = tasks;
      if (currentFilter === 'active') filtered = tasks.filter(t => !t.done);
      if (currentFilter === 'done') filtered = tasks.filter(t => t.done);

      list.innerHTML = '';

      if (filtered.length === 0) {
        emptyState.classList.add('visible');
        return;
      }

      emptyState.classList.remove('visible');

      filtered.forEach(task => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (task.done ? ' done' : '');
        item.innerHTML = `
          <button class="check-btn" onclick="toggleTask(${task.id})" title="${task.done ? 'Mark active' : 'Mark done'}">✓</button>
          <span class="todo-text">${escapeHtml(task.text)}</span>
          <span class="todo-meta">${task.time}</span>
          <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete">✕</button>
        `;
        list.appendChild(item);
      });
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    render();
  </script>
</body>
</html>
